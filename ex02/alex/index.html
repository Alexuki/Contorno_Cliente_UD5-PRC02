<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Xogo da Matriz - Configuración e Cronómetro</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
            }

            .hide {
                display: none;
            }

            .container {
                background: white;
                border-radius: 15px;
                padding: 30px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                max-width: 1000px;
                width: 100%;
            }

            h1 {
                text-align: center;
                color: #333;
                margin-bottom: 10px;
                font-size: 2em;
            }

            .instruccion {
                text-align: center;
                color: #666;
                margin-bottom: 20px;
                font-size: 1.1em;
            }

            .config-container {
                background: #f9f9f9;
                padding: 20px;
                border-radius: 10px;
                margin-bottom: 20px;
            }

            .config-group {
                display: flex;
                align-items: center;
                gap: 15px;
                margin-bottom: 15px;
                flex-wrap: wrap;
            }

            .config-group label {
                font-weight: 600;
                color: #333;
                min-width: 150px;
            }

            .config-group select {
                padding: 8px 15px;
                border: 2px solid #ddd;
                border-radius: 5px;
                font-size: 1em;
                cursor: pointer;
                background: white;
            }

            .info-container {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
                gap: 15px;
                flex-wrap: wrap;
            }

            .info-box {
                background: #f5f5f5;
                padding: 15px 20px;
                border-radius: 10px;
                text-align: center;
                flex: 1;
                min-width: 120px;
            }

            .info-box label {
                display: block;
                color: #666;
                font-size: 0.85em;
                margin-bottom: 5px;
                font-weight: 600;
            }

            .info-box .value {
                font-size: 1.6em;
                font-weight: bold;
                color: #333;
            }

            .errors .value {
                color: #e74c3c;
            }

            .next .value {
                color: #667eea;
            }

            .timer .value {
                color: #f39c12;
            }

            .timer.warning .value {
                color: #e74c3c;
                animation: pulse 1s infinite;
            }

            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.1); }
            }

            .matrix-container {
                display: grid;
                gap: 10px;
                margin-bottom: 30px;
                padding: 20px;
                background: #f9f9f9;
                border-radius: 10px;
                justify-content: center;
            }

            .numero {
                aspect-ratio: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.2em;
                font-weight: bold;
                border: 2px solid #ddd;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s ease;
                background: white;
                color: #333;
                user-select: none;
                min-width: 50px;
            }

            .numero:hover {
                border-color: #667eea;
                box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
            }

            .numero.correcta {
                background: #2ecc71;
                color: white;
                border-color: #27ae60;
            }

            .numero.error {
                background: #e74c3c;
                color: white;
                border-color: #c0392b;
            }

            .controls {
                display: flex;
                justify-content: center;
                gap: 15px;
                flex-wrap: wrap;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s ease;
                font-weight: 600;
            }

            .btn-start {
                background: #27ae60;
                color: white;
            }

            .btn-start:hover {
                background: #229954;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
            }

            .btn-reset {
                background: #667eea;
                color: white;
            }

            .btn-reset:hover {
                background: #5568d3;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }

            button:active {
                transform: translateY(0);
            }

            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .completion-message {
                text-align: center;
                padding: 20px;
                margin-top: 20px;
                border-radius: 10px;
                display: none;
                font-size: 1.3em;
                font-weight: bold;
            }

            .completion-message.success {
                background: #2ecc71;
                color: white;
                display: block;
            }

            .completion-message.timeout {
                background: #e74c3c;
                color: white;
                display: block;
            }

            .game-disabled {
                pointer-events: none;
                opacity: 0.6;
            }

            @media (max-width: 600px) {
                h1 {
                    font-size: 1.5em;
                }

                .numero {
                    font-size: 0.9em;
                    min-width: 40px;
                }

                .info-container {
                    flex-direction: column;
                }

                .info-box {
                    width: 100%;
                }

                .config-group {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }
        </style>

    </head>

    <body>
        <div class="container">
        <h1>🎮 Xogo da Matriz - Avanzado</h1>
        <p class="instruccion">Configura e pulsa os números en orden antes de que se acabe o tempo!</p>

        <div class="config-container">
            <div class="config-group">
                <label for="matrixSize">Tamaño da Matriz:</label>
                <select id="matrixSize"></select>
            </div>
            <div class="config-group">
                <label for="timeLimit">Tempo límite (segundos):</label>
                <select id="timeLimit"></select>
            </div>
        </div>

        <div class="info-container">
            <div class="info-box next">
                <label>Número esperado:</label>
                <div class="value" id="nextNumber">0</div>
            </div>
            <div class="info-box timer">
                <label>⏱️ Tempo:</label>
                <div class="value" id="timer">Remaining time</div>
            </div>
            <div class="info-box errors">
                <label>Erros:</label>
                <div class="value" id="errorCount">0</div>
            </div>
        </div>

        <div class="matrix-container" id="matrixContainer">
            <p id="infoText" style="text-align: center; color: #999; padding: 40px;">Pulsa "Iniciar Xogo" para comezar</p>
        </div>

        <div class="controls">
            <button class="btn-start" id="btnStart">▶️ Iniciar Xogo</button>
            <button class="btn-reset" id="btnReset">🔄 Reiniciar</button>
        </div>

        <div class="completion-message" id="completionMessage"></div>
    </div>

    <script src="app.js"></script>
        
    </body>

</html>
