version: '3.8'

services:
  web:
    image: php:8.2-apache
    container_name: xogo-matriz-web
    ports:
      - "8081:80"
    volumes:
      - ./www:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    restart: unless-stopped
    networks:
      - lamp-network

networks:
  lamp-network:
    driver: bridge
